<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonator Health Kiosk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Health Self-Check Kiosk</h1>
        <p>System Status: Online | Location: Laho-roi</p>
    </header>

    <main>
        <form id="bmiForm">
            <label for="name">Full Name</label>
            <input type="text" id="name" required>
            
            <label for="age">Age</label>
            <input type="number" id="age" min="1" max="120" required>
            
            <label for="sex">Sex</label>
            <select id="sex" required>
                <option value="">Select</option>
                <option value="Female">Female</option>
                <option value="Male">Male</option>
            </select>
            
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" min="1" required>
            
            <label for="height">Height (cm)</label>
            <input type="number" id="height" min="1" required>
            
            <button type="submit">Initialize Scan</button>
        </form>

        <section id="resultCard" class="hidden">
            <!-- Result displayed here -->
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
